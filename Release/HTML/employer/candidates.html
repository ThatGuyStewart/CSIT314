<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Candidates – TalentMatch</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">✦ TalentMatch</a>
    <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
    <div class="nav-links">
      <a href="/employer/dashboard" class="nav-link">Dashboard</a>
      <a href="/employer/company-profile" class="nav-link">Company Profile</a>
      <a href="/employer/manage-jobs" class="nav-link">Manage Jobs</a>
      <a href="/employer/candidates" class="nav-link active">Browse Candidates</a>
      <a href="/employer/membership" class="nav-link">Membership</a>
      <a href="/logout" class="nav-link nav-danger">Logout</a>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header">
      <h1>👥 Browse Candidates</h1>
      <button class="btn btn-secondary filter-toggle-btn">⚙ Filters</button>
    </div>

    <form method="GET" action="/employer/candidates">
      <div style="margin-bottom:16px;">
        <div class="search-bar">
          <input type="text" name="keyword" class="form-input" placeholder="Search by name, skill, major, or keyword…">
          <button type="submit" class="btn btn-primary">Search</button>
          <a href="/employer/candidates" class="btn btn-secondary">Clear</a>
        </div>
      </div>

      <div class="filter-panel">
        <div class="filter-row">
          <div class="form-group">
            <label class="form-label">Skills</label>
            <input type="text" name="skills" class="form-input" placeholder="e.g. Python, React">
          </div>
          <div class="form-group">
            <label class="form-label">Education Level</label>
            <select name="education" class="form-select">
              <option value="">Any Education</option>
              <option>High School</option>
              <option>Bachelor's</option>
              <option>Master's</option>
              <option>PhD</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Min. Years Experience</label>
            <input type="number" name="years_experience" class="form-input" min="0" max="30" placeholder="0">
          </div>
          <div class="form-group">
            <label class="form-label">Preferred Work Mode</label>
            <select name="preferred_work_mode" class="form-select">
              <option value="">Any Mode</option>
              <option>Remote</option>
              <option>On-site</option>
              <option>Hybrid</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Preferred Location</label>
            <input type="text" name="preferred_location" class="form-input" placeholder="e.g. New York">
          </div>
        </div>
        <div style="margin-top:16px; display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary">Apply Filters</button>
          <a href="/employer/candidates" class="btn btn-secondary">Clear All</a>
        </div>
      </div>
    </form>

    <div class="results-info">
      Showing <span id="shownCount">0</span> of <strong id="totalCount">0</strong> candidates
    </div>

    <div class="grid-3" id="candidates-grid"></div>
  </div>

  <script src="/assets/js/main.js"></script>
</body>
</html>
