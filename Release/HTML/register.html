<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – TalentMatch</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">✦ TalentMatch</a>
    <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
    <div class="nav-links">
      <a href="/login" class="nav-link">Login</a>
      <a href="/register" class="nav-link active">Register</a>
    </div>
  </nav>

  <div style="min-height:calc(100vh - 64px); display:flex; align-items:center; justify-content:center; padding:40px 24px; background:var(--bg-main);">
    <div style="width:100%; max-width:520px;">
      <div style="text-align:center; margin-bottom:32px;">
        <h1 style="font-size:2rem; margin-bottom:8px;">Create your account</h1>
        <p style="color:var(--text-muted);">Join TalentMatch and start your journey.</p>
      </div>

      <div class="card">
        <div id="error-messages" class="alert alert-error" hidden></div>

        <form id="register-form">
            <div class="form-group">
                <label class="form-label">I am a…</label>
                <div class="radio-group">
                    <label class="radio-option" style="flex:1; justify-content:center;">
                        <input type="radio" name="role" value="candidate" checked>
                        🎓 Candidate
                    </label>
                    <label class="radio-option" style="flex:1; justify-content:center;">
                        <input type="radio" name="role" value="employer">
                        🏢 Employer
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-input" placeholder="Jane Smith" required autocomplete="name">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Repeat password" required autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
                Create Account →
            </button>
        </form>

        <div class="divider">or</div>

        <p style="text-align:center; color:var(--text-muted); font-size:0.9rem;">
          Already have an account?
          <a href="/login" style="font-weight:600; color:var(--navy-primary);">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/assets/js/main.js"></script>
  <script>
    (function () {
      const role = new URLSearchParams(window.location.search).get('role');
      if (role === 'candidate' || role === 'employer') {
        const input = document.querySelector(`input[name="role"][value="${role}"]`);
        if (input) input.checked = true;
      }
    })();
  </script>
</body>
</html>
