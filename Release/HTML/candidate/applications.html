<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Applications – TalentMatch</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">✦ TalentMatch</a>

    <div class="nav-links">

      <a href="/candidate/profile" class="nav-link">My Profile</a>
      <a href="/candidate/jobs" class="nav-link">Browse Jobs</a>

  </nav>

    <div class="page-header">
      <div>

  <script src="/assets/js/main.js"></script>
